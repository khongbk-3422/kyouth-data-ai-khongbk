<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Database Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 30px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4 text-center">📊 Job Database Dashboard</h2>

        <div class="card p-4">
            <h4>Search Database</h4>
            <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search by job title or company...">
            <ul id="searchResults" class="list-group"></ul>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="text-center">Data Quality</h4>
                    <canvas id="qualityPieChart"></canvas>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="text-center">Top 5 Companies</h4>
                    <canvas id="companyBarChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Fetch Chart Data and Render
        fetch('/api/charts')
            .then(response => response.json())
            .then(data => {
                // Render Pie Chart
                new Chart(document.getElementById('qualityPieChart'), {
                    type: 'pie',
                    data: {
                        labels: data.quality.labels,
                        datasets: [{
                            data: data.quality.data,
                            backgroundColor: ['#4CAF50', '#F44336'] // Green and Red
                        }]
                    }
                });

                // Render Bar Chart
                new Chart(document.getElementById('companyBarChart'), {
                    type: 'bar',
                    data: {
                        labels: data.companies.labels,
                        datasets: [{
                            label: 'Number of Jobs',
                            data: data.companies.data,
                            backgroundColor: '#5c54c4' // Purple
                        }]
                    }
                });
            });

        // 2. Search Bar Logic
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value;
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = ''; // Clear if too short
                return;
            }

            fetch(`/api/search?q=${query}`)
                .then(response => response.json())
                .then(jobs => {
                    const list = document.getElementById('searchResults');
                    list.innerHTML = ''; // Clear old results
                    jobs.forEach(job => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item';
                        li.textContent = `${job.title} — (${job.company})`;
                        list.appendChild(li);
                    });
                });
        });
    </script>
</body>
</html>
