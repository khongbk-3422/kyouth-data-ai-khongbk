<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Styles to match the screenshot */
        body {
            background-color: #2b2b2b; /* Dark background behind the white page */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .main-container {
            background-color: white;
            width: 90%;
            max-width: 1000px;
            padding: 40px;
            border-radius: 5px;
        }
        .chat-container {
            background-color: #f4f3f3;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 20px;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
        }
        .chat-bubble {
            padding: 10px 20px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .bot-bubble {
            background-color: #ffffff;
            border: 1px solid #ddd;
            color: #333;
        }
        .user-bubble {
            background-color: #5c54c4; /* Purple to match image */
            color: white;
        }
        .input-container {
            background-color: white;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 5px 10px;
            margin-top: 15px;
        }
        .input-container input {
            border: none;
            box-shadow: none;
            flex-grow: 1;
        }
        .input-container input:focus {
            outline: none;
        }
        .send-btn {
            background-color: #5c54c4;
            color: white;
            border-radius: 8px;
            font-weight: 500;
        }
        .send-btn:hover {
            background-color: #4a43a3;
            color: white;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #6c757d;
            font-size: 1.2rem;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <div class="d-flex justify-content-start mb-3">
                    <div class="chat-bubble bot-bubble">Hi! How can I help you today?</div>
                </div>
                <div class="d-flex justify-content-end mb-3">
                    <div class="chat-bubble user-bubble">Hi</div>
                </div>
                <div class="d-flex justify-content-start mb-3">
                    <div class="chat-bubble bot-bubble">Hello!</div>
                </div>
            </div>
        </div>

        <div class="input-container d-flex align-items-center">
            <button class="icon-btn"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="btn send-btn px-4" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Function to create a new user message and add it to the chat
        function sendMessage() {
            const messageText = messageInput.value.trim();
            
            // Do nothing if the input is empty
            if (messageText === "") return;

            // Build the HTML for the new user bubble
            const userMessageHtml = `
                <div class="d-flex justify-content-end mb-3">
                    <div class="chat-bubble user-bubble">${messageText}</div>
                </div>
            `;

            // Insert it into the chat box
            chatBox.insertAdjacentHTML('beforeend', userMessageHtml);

            // Clear the input field and scroll to the bottom of the chat
            messageInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Trigger send when the Send button is clicked
        sendBtn.addEventListener('click', sendMessage);

        // Trigger send when the Enter key is pressed
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
