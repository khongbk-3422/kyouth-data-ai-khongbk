<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Styles to match the screenshot */
        body {
            background-color: #2b2b2b; /* Dark background behind the white page */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .main-container {
            background-color: white;
            width: 90%;
            max-width: 1000px;
            padding: 40px;
            border-radius: 5px;
        }
        .chat-container {
            background-color: #f4f3f3;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 20px;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
        }
        .chat-bubble {
            padding: 10px 20px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .bot-bubble {
            background-color: #ffffff;
            border: 1px solid #ddd;
            color: #333;
        }
        .user-bubble {
            background-color: #5c54c4; /* Purple to match image */
            color: white;
        }
        .input-container {
            background-color: white;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 5px 10px;
            margin-top: 15px;
        }
        .input-container input {
            border: none;
            box-shadow: none;
            flex-grow: 1;
        }
        .input-container input:focus {
            outline: none;
        }
        .send-btn {
            background-color: #5c54c4;
            color: white;
            border-radius: 8px;
            font-weight: 500;
        }
        .send-btn:hover {
            background-color: #4a43a3;
            color: white;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #6c757d;
            font-size: 1.2rem;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <div class="d-flex justify-content-start mb-3">
                    <div class="chat-bubble bot-bubble">Hi! How can I help you today?</div>
                </div>
                <div class="d-flex justify-content-end mb-3">
                    <div class="chat-bubble user-bubble">Hi</div>
                </div>
                <div class="d-flex justify-content-start mb-3">
                    <div class="chat-bubble bot-bubble">Hello!</div>
                </div>
            </div>
        </div>

        <div class="input-container d-flex align-items-center">
            <button class="icon-btn"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
            
            <select id="modelSelector" class="form-select me-2" style="width: auto; border: none; font-weight: bold; color: #5c54c4;">
                <option value="gemini">Gemini Cloud</option>
                <option value="ollama">Ollama Local</option>
            </select>

            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="btn send-btn px-4" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // ❌ REMOVED selectedModel FROM HERE

        // Note the "async" keyword - we need this to wait for the AI to reply!
        async function sendMessage() {
            const messageText = messageInput.value.trim();
            if (messageText === "") return;

            // ✅ MOVED IT HERE: Now it checks the dropdown exactly when you click Send!
            const selectedModel = document.getElementById('modelSelector').value;

            // 1. Show the user's message immediately
            const userMessageHtml = `
                <div class="d-flex justify-content-end mb-3">
                    <div class="chat-bubble user-bubble">${messageText}</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', userMessageHtml);
            messageInput.value = ''; // Clear the input box
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Show a temporary "AI is typing..." message
            const typingId = "typing-" + Date.now();
            const typingHtml = `
                <div class="d-flex justify-content-start mb-3" id="${typingId}">
                    <div class="chat-bubble bot-bubble text-muted"><em>AI is typing...</em></div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', typingHtml);
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Send the message to your FastAPI Backend!
            try {
                const response = await fetch('http://127.0.0.1:8080/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: messageText,
                        model_choice: selectedModel // This will now send "ollama" correctly!
                    })
                });

                const data = await response.json();

                // 4. Remove the "typing..." message
                document.getElementById(typingId).remove();

                // 5. Show the real AI response
                const formattedResponse = data.response.replace(/\n/g, '<br>');
                const botMessageHtml = `
                    <div class="d-flex justify-content-start mb-3">
                        <div class="chat-bubble bot-bubble">${formattedResponse}</div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', botMessageHtml);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                // If the backend is off or crashes, show an error
                document.getElementById(typingId).remove();
                const errorHtml = `
                    <div class="d-flex justify-content-start mb-3">
                        <div class="chat-bubble bot-bubble text-danger">Error: Could not reach the AI backend.</div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', errorHtml);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
