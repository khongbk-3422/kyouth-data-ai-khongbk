services:
  # 1. The AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      # Link directly to your Windows Ollama storage path!
      # Change YOUR_WINDOWS_USERNAME to match your C:/Users/ folder name
      - C:/Users/khong/.ollama:/root/.ollama
    networks:
      - app-network

  # 2. The Python Backend
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8080:8000"
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      - ollama

  # 3. The Web UI Frontend
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge